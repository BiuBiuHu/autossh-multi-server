tunnels:
  - name: "Server 1"
    pem_file: "/path/to/your/key1.pem"
    ssh_host: "root@192.168.1.100"
    monitor_port: 20129
    port_forwards:
      - local: 20128
        remote: 20128
      - local: 18788
        remote: 18789

  - name: "Server 2"
    pem_file: "/path/to/your/key2.pem"
    ssh_host: "root@192.168.1.101"
    monitor_port: 20130
    port_forwards:
      - local: 18787
        remote: 18789

